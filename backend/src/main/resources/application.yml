server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: campuslink-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campuslink?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT 配置
campuslink:
  jwt:
    secret: campuslink-secret-key-for-jwt-signing-must-be-long-enough-2026
    # 过期时间（毫秒），默认 7 天
    expiration: 604800000
    header: Authorization
    prefix: "Bearer "

logging:
  level:
    com.campuslink: debug
